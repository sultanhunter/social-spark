<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TikTok Saver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Social Spark TikTok Saver</h1>

      <label>
        Backend URL
        <input id="backendUrl" type="url" placeholder="https://your-social-spark.app" />
      </label>

      <label>
        Collection ID
        <input id="collectionId" type="text" placeholder="7579367d-a324-4995-b326-f21f6deb02ea" value="7579367d-a324-4995-b326-f21f6deb02ea" />
      </label>

      <div class="grid">
        <label>
          Confidence Threshold
          <input id="confidenceThreshold" type="number" min="0.1" max="0.95" step="0.05" value="0.6" />
        </label>

        <label>
          Batch Size
          <input id="batchSize" type="number" min="1" max="10" step="1" value="3" />
        </label>
      </div>

      <div class="grid">
        <label>
          Flush (ms)
          <input id="flushIntervalMs" type="number" min="1000" step="500" value="4000" />
        </label>

        <label>
          Auto Scroll (ms)
          <input id="autoScrollIntervalMs" type="number" min="500" step="100" value="1500" />
        </label>
      </div>

      <div class="actions">
        <button id="startBtn" class="primary">Start</button>
        <button id="stopBtn">Stop</button>
        <button id="flushBtn">Flush</button>
      </div>

      <section class="stats">
        <h2>Stats</h2>
        <p id="running">Running: no</p>
        <p id="detected">Detected: 0</p>
        <p id="queued">Queued: 0</p>
        <p id="saved">Saved: 0</p>
        <p id="skipped">Skipped: 0</p>
        <p id="failed">Failed: 0</p>
        <p id="lastError">Last error: none</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
